openapi: 3.0.3
info:
  title: Clan Domain (Social Service Internal)
  version: 0.2.0
servers:
  - url: http://social_service:3000
paths:
  /internal/clans:
    post:
      summary: Create clan
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: OK }
    get:
      summary: List clans
      responses:
        "200": { description: OK }

  /internal/clans/{clanId}:
    get:
      summary: Get clan by id
      parameters:
        - in: path
          name: clanId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }
    patch:
      summary: Update clan
      parameters:
        - in: path
          name: clanId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: OK }
    delete:
      summary: Delete clan
      parameters:
        - in: path
          name: clanId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /internal/clans/by-user/{userId}:
    get:
      summary: List clans by user
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /internal/clans/{clanId}/members:
    get:
      summary: List clan members
      parameters:
        - in: path
          name: clanId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /internal/clans/{clanId}/members/{userId}:
    get:
      summary: Get clan member
      parameters:
        - in: path
          name: clanId
          required: true
          schema: { type: string }
        - in: path
          name: userId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }
    patch:
      summary: Update clan member
      parameters:
        - in: path
          name: clanId
          required: true
          schema: { type: string }
        - in: path
          name: userId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: OK }
    delete:
      summary: Remove clan member
      parameters:
        - in: path
          name: clanId
          required: true
          schema: { type: string }
        - in: path
          name: userId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /internal/clans/{clanId}/invites:
    post:
      summary: Create clan invite
      parameters:
        - in: path
          name: clanId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: OK }

  /internal/clan-invites/by-user/{userId}:
    get:
      summary: List clan invites by user
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /internal/clan-invites/{inviteId}/accept:
    post:
      summary: Accept clan invite
      parameters:
        - in: path
          name: inviteId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /internal/clan-invites/{inviteId}/decline:
    post:
      summary: Decline clan invite
      parameters:
        - in: path
          name: inviteId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /internal/clans/{clanId}/join-requests:
    post:
      summary: Create clan join request
      parameters:
        - in: path
          name: clanId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: OK }
    get:
      summary: List clan join requests
      parameters:
        - in: path
          name: clanId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /internal/clan-join-requests/{requestId}/approve:
    post:
      summary: Approve join request
      parameters:
        - in: path
          name: requestId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /internal/clan-join-requests/{requestId}/reject:
    post:
      summary: Reject join request
      parameters:
        - in: path
          name: requestId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /internal/clans/{clanId}/is-member/{userId}:
    get:
      summary: Check clan membership
      parameters:
        - in: path
          name: clanId
          required: true
          schema: { type: string }
        - in: path
          name: userId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }
