openapi: 3.0.3
info:
  title: Social Domain (Social Service Internal)
  version: 0.2.0
servers:
  - url: http://social_service:3000
paths:
  /internal:
    get:
      summary: Social service root
      responses:
        "200": { description: OK }

  /internal/health:
    get:
      summary: Social service health
      responses:
        "200": { description: OK }

  /internal/friends/{userId}:
    get:
      summary: List friends
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /internal/friend-requests:
    post:
      summary: Create friend request
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: OK }

  /internal/friend-requests/incoming/{userId}:
    get:
      summary: List incoming friend requests
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /internal/friend-requests/outgoing/{userId}:
    get:
      summary: List outgoing friend requests
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /internal/friend-requests/{requestId}/accept:
    post:
      summary: Accept friend request
      parameters:
        - in: path
          name: requestId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /internal/friend-requests/{requestId}/decline:
    post:
      summary: Decline friend request
      parameters:
        - in: path
          name: requestId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /internal/friend-requests/{requestId}/cancel:
    post:
      summary: Cancel friend request
      parameters:
        - in: path
          name: requestId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /internal/friends/{userId}/{otherUserId}:
    delete:
      summary: Remove friend
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
        - in: path
          name: otherUserId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /internal/blocks/{userId}:
    get:
      summary: List blocks
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /internal/blocks:
    post:
      summary: Create block
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: OK }

  /internal/blocks/{userId}/{blockedUserId}:
    delete:
      summary: Remove block
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
        - in: path
          name: blockedUserId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /internal/social/is-friends:
    get:
      summary: Check friendship relation
      parameters:
        - in: query
          name: u
          required: true
          schema: { type: string }
        - in: query
          name: v
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /internal/social/is-blocked:
    get:
      summary: Check block relation
      parameters:
        - in: query
          name: u
          required: true
          schema: { type: string }
        - in: query
          name: v
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }
