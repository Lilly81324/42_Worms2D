openapi: 3.0.3
info:
  title: User Domain (Social Service Internal)
  version: 0.2.0
servers:
  - url: http://social_service:3000
paths:
  /internal/users/{userId}/profile:
    get:
      summary: Get user profile
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }
    patch:
      summary: Update user profile
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: OK }

  /internal/users/search:
    get:
      summary: Search users
      responses:
        "200": { description: OK }

  /internal/users/{userId}/privacy:
    get:
      summary: Get user privacy
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }
    patch:
      summary: Update user privacy
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: OK }

  /internal/users/{userId}/presence:
    patch:
      summary: Update user presence
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: OK }

  /internal/users/{userId}/avatar:
    post:
      summary: Upload user avatar
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200": { description: OK }
    delete:
      summary: Delete user avatar
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /internal/uploads/avatars/{fileName}:
    get:
      summary: Download avatar by file name
      parameters:
        - in: path
          name: fileName
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }
