services:

  frontend_static:
    profiles: ["prod"]
    build:
      context: ../apps/frontend
      additional_contexts:
        shared: ../shared/game
    working_dir: /app
    command: ["npm", "run", "start"]
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "${FRONTEND_HOST_PORT:-3005}:3000"
    volumes:
      - frontend_next:/app/.next
      - frontend_node_modules:/app/node_modules
    networks: [backend]

  game_service_static:
    profiles: ["prod"]
    build:
      context: ../apps/game
    working_dir: /app
    command: ["node", "dist/main.js"]
    environment:
      NODE_ENV: production
      PORT: 3001
    volumes:
      - game_service_dist:/app/dist:ro
    networks: [backend]

  bff:
    command: ["sh", "-c", "node dist/main.js"]
    volumes:
      - bff_dist:/app/dist:ro
      - bff_node_modules:/app/node_modules:ro

  auth_service:
    entrypoint: []
    command: ["sh", "-c", "node dist/src/main.js"]
    environment:
      NODE_ENV: production
      PRISMA_GENERATE_ON_START: "false"
      PRISMA_RUN_MIGRATIONS: "false"
    volumes:
      - auth_service_dist:/app/dist:ro
      - auth_service_node_modules:/app/node_modules:ro

  social_service:
    command: ["sh", "-c", "node dist/main.js"]
    environment:
      NODE_ENV: production
    volumes:
      - social_service_dist:/app/dist:ro
      - social_service_node_modules:/app/node_modules:ro

  stats_service:
    command: ["sh", "-c", "node dist/src/main.js"]
    environment:
      NODE_ENV: production
    volumes:
      - stats_service_dist:/app/dist:ro
      - stats_service_node_modules:/app/node_modules:ro
