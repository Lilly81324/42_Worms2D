openapi: 3.0.3
info:
  title: BFF API Gateway
  version: 0.2.0
  description: Current BFF routes implemented in apps/BFF controllers.
servers:
  - url: http://localhost:8080/api
tags:
  - name: System
  - name: Auth
  - name: User
  - name: Friends
  - name: Blocks
  - name: Clans
  - name: Chat
  - name: Stats
  - name: Admin
paths:
  /:
    get:
      tags: [System]
      summary: BFF root
      responses:
        "200":
          description: OK

  /bff/lobby:
    get:
      tags: [System]
      summary: Lobby health/proxy endpoint
      responses:
        "200": { description: OK }

  /auth/register:
    post:
      tags: [Auth]
      summary: Register user
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "201": { description: Created }

  /auth/login:
    post:
      tags: [Auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: OK }

  /auth/google/exchange:
    post:
      tags: [Auth]
      summary: Exchange Google auth
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: OK }

  /auth/google/start:
    get:
      tags: [Auth]
      summary: Start Google OAuth
      responses:
        "302": { description: Redirect }

  /auth/google/callback:
    get:
      tags: [Auth]
      summary: Google OAuth callback
      responses:
        "302": { description: Redirect }

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: OK }

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh token pair
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: OK }

  /auth/password/set:
    post:
      tags: [Auth]
      summary: Set password
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: OK }

  /auth/verify:
    get:
      tags: [Auth]
      summary: Verify access token
      responses:
        "200": { description: OK }

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user context
      responses:
        "200": { description: OK }

  /users/me/profile:
    get:
      tags: [User]
      summary: Get my profile
      responses:
        "200": { description: OK }
    patch:
      tags: [User]
      summary: Update my profile
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: OK }

  /users/me/avatar:
    post:
      tags: [User]
      summary: Upload my avatar
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200": { description: OK }
    delete:
      tags: [User]
      summary: Delete my avatar
      responses:
        "200": { description: OK }

  /users/{userId}/profile:
    get:
      tags: [User]
      summary: Get user profile by id
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /users/search:
    get:
      tags: [User]
      summary: Search users for friend lookup by username, email, display name, or id
      responses:
        "200": { description: OK }

  /users/me/privacy:
    get:
      tags: [User]
      summary: Get my privacy settings
      responses:
        "200": { description: OK }
    patch:
      tags: [User]
      summary: Update my privacy settings
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: OK }

  /friends:
    get:
      tags: [Friends]
      summary: List my friends
      responses:
        "200": { description: OK }

  /friends/requests/incoming:
    get:
      tags: [Friends]
      summary: List incoming friend requests
      responses:
        "200": { description: OK }

  /friends/requests/outgoing:
    get:
      tags: [Friends]
      summary: List outgoing friend requests
      responses:
        "200": { description: OK }

  /friends/requests:
    post:
      tags: [Friends]
      summary: Create friend request
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: OK }

  /friends/requests/{requestId}/accept:
    post:
      tags: [Friends]
      summary: Accept friend request
      parameters:
        - in: path
          name: requestId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /friends/requests/{requestId}/decline:
    post:
      tags: [Friends]
      summary: Decline friend request
      parameters:
        - in: path
          name: requestId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /friends/requests/{requestId}/cancel:
    post:
      tags: [Friends]
      summary: Cancel friend request
      parameters:
        - in: path
          name: requestId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /friends/{userId}:
    delete:
      tags: [Friends]
      summary: Remove friend
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /blocks:
    get:
      tags: [Blocks]
      summary: List my blocks
      responses:
        "200": { description: OK }

  /blocks/{userId}:
    post:
      tags: [Blocks]
      summary: Block user
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }
    delete:
      tags: [Blocks]
      summary: Unblock user
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /clans:
    post:
      tags: [Clans]
      summary: Create clan
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: OK }
    get:
      tags: [Clans]
      summary: List clans
      responses:
        "200": { description: OK }

  /clans/me:
    get:
      tags: [Clans]
      summary: List my clans
      responses:
        "200": { description: OK }

  /clans/me/invites:
    get:
      tags: [Clans]
      summary: List my clan invites
      responses:
        "200": { description: OK }

  /clans/{clanId}:
    get:
      tags: [Clans]
      summary: Get clan by id
      parameters:
        - in: path
          name: clanId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }
    patch:
      tags: [Clans]
      summary: Update clan
      parameters:
        - in: path
          name: clanId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: OK }
    delete:
      tags: [Clans]
      summary: Delete clan
      parameters:
        - in: path
          name: clanId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /clans/{clanId}/members:
    get:
      tags: [Clans]
      summary: List clan members
      parameters:
        - in: path
          name: clanId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /clans/{clanId}/members/{userId}:
    patch:
      tags: [Clans]
      summary: Update clan member
      parameters:
        - in: path
          name: clanId
          required: true
          schema: { type: string }
        - in: path
          name: userId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: OK }
    delete:
      tags: [Clans]
      summary: Remove clan member
      parameters:
        - in: path
          name: clanId
          required: true
          schema: { type: string }
        - in: path
          name: userId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /clans/{clanId}/invites:
    post:
      tags: [Clans]
      summary: Create clan invite
      parameters:
        - in: path
          name: clanId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: OK }

  /clans/invites/{inviteId}/accept:
    post:
      tags: [Clans]
      summary: Accept clan invite
      parameters:
        - in: path
          name: inviteId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /clans/invites/{inviteId}/decline:
    post:
      tags: [Clans]
      summary: Decline clan invite
      parameters:
        - in: path
          name: inviteId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /clans/{clanId}/join-requests:
    post:
      tags: [Clans]
      summary: Create clan join request
      parameters:
        - in: path
          name: clanId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: OK }
    get:
      tags: [Clans]
      summary: List clan join requests
      parameters:
        - in: path
          name: clanId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /clans/join-requests/{requestId}/approve:
    post:
      tags: [Clans]
      summary: Approve clan join request
      parameters:
        - in: path
          name: requestId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /clans/join-requests/{requestId}/reject:
    post:
      tags: [Clans]
      summary: Reject clan join request
      parameters:
        - in: path
          name: requestId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /chats:
    get:
      tags: [Chat]
      summary: List chats for current user
      responses:
        "200": { description: OK }

  /chats/dm:
    post:
      tags: [Chat]
      summary: Create or get DM thread
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: OK }

  /chats/{threadId}:
    get:
      tags: [Chat]
      summary: Get thread
      parameters:
        - in: path
          name: threadId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /chats/{threadId}/messages:
    get:
      tags: [Chat]
      summary: List thread messages
      parameters:
        - in: path
          name: threadId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }
    post:
      tags: [Chat]
      summary: Send message
      parameters:
        - in: path
          name: threadId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: OK }

  /messages/{messageId}:
    patch:
      tags: [Chat]
      summary: Edit message
      parameters:
        - in: path
          name: messageId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: OK }
    delete:
      tags: [Chat]
      summary: Delete message
      parameters:
        - in: path
          name: messageId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /chats/{threadId}/mute:
    post:
      tags: [Chat]
      summary: Mute thread
      parameters:
        - in: path
          name: threadId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /chats/{threadId}/unmute:
    post:
      tags: [Chat]
      summary: Unmute thread
      parameters:
        - in: path
          name: threadId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /chats/{threadId}/read:
    post:
      tags: [Chat]
      summary: Mark thread read
      parameters:
        - in: path
          name: threadId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: OK }

  /uploads/avatars/{fileName}:
    get:
      tags: [User]
      summary: Fetch avatar file
      parameters:
        - in: path
          name: fileName
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /admin/users:
    get:
      tags: [Admin]
      summary: List/search users
      responses:
        "200": { description: OK }

  /admin/users/{userId}:
    get:
      tags: [Admin]
      summary: Get user details
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /admin/users/{userId}/disable:
    post:
      tags: [Admin]
      summary: Disable user
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: OK }

  /admin/users/{userId}/enable:
    post:
      tags: [Admin]
      summary: Enable user
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: OK }

  /admin/users/{userId}/role:
    post:
      tags: [Admin]
      summary: Set user roles
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: OK }

  /admin/users/{userId}/sessions/revoke:
    post:
      tags: [Admin]
      summary: Revoke user sessions
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: OK }

  /admin/audit:
    get:
      tags: [Admin]
      summary: List auth audit logs
      responses:
        "200": { description: OK }

  /admin/users/{userId}/stats:
    get:
      tags: [Admin]
      summary: Get user stats
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }
    put:
      tags: [Admin]
      summary: Update user stats
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: OK }

  /stats/users/{userId}:
    get:
      tags: [Stats]
      summary: Get user stats
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /stats/users/{userId}/matches:
    get:
      tags: [Stats]
      summary: Get user match history
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /stats/matches:
    get:
      tags: [Stats]
      summary: List matches
      responses:
        "200": { description: OK }

  /stats/matches/{matchId}:
    get:
      tags: [Stats]
      summary: Get match by id
      parameters:
        - in: path
          name: matchId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /stats/matches/{matchId}/members:
    get:
      tags: [Stats]
      summary: List match members
      parameters:
        - in: path
          name: matchId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
