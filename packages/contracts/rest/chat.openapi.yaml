openapi: 3.0.3
info:
  title: Chat Domain (Social Service Internal)
  version: 0.2.0
servers:
  - url: http://social_service:3000
paths:
  /internal/chats/by-user/{userId}:
    get:
      summary: List chat threads by user
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /internal/chats/dm:
    post:
      summary: Create or get DM thread
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: OK }

  /internal/chats/{threadId}:
    get:
      summary: Get thread by id
      parameters:
        - in: path
          name: threadId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /internal/chats/{threadId}/messages:
    get:
      summary: List thread messages
      parameters:
        - in: path
          name: threadId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }
    post:
      summary: Send message
      parameters:
        - in: path
          name: threadId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: OK }

  /internal/messages/{messageId}:
    patch:
      summary: Edit message
      parameters:
        - in: path
          name: messageId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: OK }
    delete:
      summary: Delete message
      parameters:
        - in: path
          name: messageId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /internal/chats/{threadId}/mute:
    post:
      summary: Mute thread
      parameters:
        - in: path
          name: threadId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /internal/chats/{threadId}/unmute:
    post:
      summary: Unmute thread
      parameters:
        - in: path
          name: threadId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /internal/chats/{threadId}/read:
    post:
      summary: Mark thread as read
      parameters:
        - in: path
          name: threadId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: OK }

  /internal/chats/{threadId}/can-read/{userId}:
    get:
      summary: Check whether user can read thread
      parameters:
        - in: path
          name: threadId
          required: true
          schema: { type: string }
        - in: path
          name: userId
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }
